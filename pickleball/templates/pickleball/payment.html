<!DOCTYPE html>
<html>
<head>
  <title>Payment</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

  <h2>Payment for {{ booking.court.name }} - {{ booking.court.game_type }}</h2>

  <p><strong>Slot:</strong> {{ booking.time_slot }}</p>
  <p><strong>Name:</strong> {{ booking.name }}</p>
  <p><strong>Date:</strong> {{ booking.date }}</p>
  <p><strong>Amount:</strong> ₹{{ booking.court.price }}</p>

  {% if error %}
      <p style="color:red;">{{ error }}</p>
  {% endif %}

  <form method="POST">
      {% csrf_token %}
      <label><strong>Select Payment Method:</strong></label><br><br>

      <input type="radio" name="method" value="upi" required> UPI <br>
      <input type="radio" name="method" value="cash"> Cash <br><br>

      <button type="submit" class="btn btn-primary">Confirm Payment</button>
  </form>

</body>
</html>
